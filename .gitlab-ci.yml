# GitLab mirror of .github/workflows/gates.yml — same harness commands,
# so "the pipeline is the gate" holds on either forge.
gates:
  image: python:3.12
  script:
    - scripts/run-gate internal
  after_script:
    - scripts/collect-proof
  artifacts:
    when: always
    paths:
      - .grounding/
      - framework/contract.yml
      - framework/harness.json

client-uat:
  image: python:3.12
  needs:
    - job: gates
      artifacts: true
  when: manual
  environment:
    name: client-uat
  script:
    - scripts/approve-uat --approved-by "$GITLAB_USER_LOGIN" --notes "Protected GitLab UAT job"
    - scripts/run-gate G4
  artifacts:
    paths:
      - .grounding/

scheduled-escalations:
  image: python:3.12
  needs:
    - job: gates
      artifacts: true
  when: always
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
  cache:
    key: "psq-escalations-$CI_COMMIT_REF_SLUG"
    paths:
      - .grounding/escalation-state.json
    policy: pull-push
    when: always
  script:
    - python3 tools/escalation-watcher.py
  artifacts:
    when: always
    paths:
      - .grounding/escalation-state.json
