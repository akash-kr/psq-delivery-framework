adapter:
  id: strapi
  name: Strapi CMS
  priority: 90
  applies_to:
    - cms
    - headless_cms
    - content_platform

detect:
  any:
    - config/admin.js
    - config/database.js
    - src/api
    - src/components
    - src/content-types

commands:
  install: "if [ -f package-lock.json ]; then npm ci; else npm install; fi"
  lint: "npm run lint"
  typecheck: "npm run typecheck"
  build: "npm run build"
  unit_test: "npm test"
  ai_review: ""
  e2e_test: "skip"
  visual_test: "skip"
  integration_test: "npm run test:integration"

proof:
  recommended:
    - content_types_reviewed
    - seed_data_verified
    - admin_build_log
    - unit_test_log
    - integration_test_log
    - api_health_check
    - preview_workflow_check
