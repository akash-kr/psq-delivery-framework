adapter:
  id: python
  name: Python
  priority: 50
  applies_to:
    - api
    - cli
    - library
    - service

detect:
  any:
    - pyproject.toml
    - requirements.txt
    - setup.py

commands:
  install: "python3 -m pip install -r requirements.txt"
  lint: "python3 -m ruff check ."
  typecheck: "python3 -m mypy ."
  build: "python3 -m compileall ."
  unit_test: "python3 -m pytest"
  ai_review: ""
  e2e_test: "skip"
  visual_test: "skip"
  integration_test: ""

proof:
  recommended:
    - install_log
    - lint_log
    - typecheck_log
    - unit_test_log
    - integration_test_log

notes:
  - "Configure integration_test for APIs/services, or mark it 'skip' explicitly for libraries and CLIs."
