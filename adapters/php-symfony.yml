adapter:
  id: php-symfony
  name: PHP Symfony
  priority: 80
  applies_to:
    - web_app
    - api
    - service

detect:
  any:
    - composer.json
    - symfony.lock
    - config/bundles.php

commands:
  install: "composer install"
  lint: "composer lint"
  typecheck: "composer analyse"
  build: "php bin/console cache:warmup"
  unit_test: "composer test"
  ai_review: ""
  e2e_test: "skip"
  visual_test: "skip"
  integration_test: "composer test:integration"

proof:
  recommended:
    - composer_install_log
    - lint_log
    - unit_test_log
    - integration_test_log
    - route_check

notes:
  - "Override command names in framework/harness.json if the Symfony project uses different Composer scripts."
