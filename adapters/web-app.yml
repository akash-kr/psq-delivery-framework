adapter:
  id: web-app
  name: Generic Web App
  priority: 10
  applies_to:
    - spa
    - server-rendered-web
    - frontend-backend-app

detect:
  any:
    - package.json
    - pnpm-lock.yaml
    - yarn.lock
    - package-lock.json

commands:
  install: "if [ -f package-lock.json ]; then npm ci; else npm install; fi"
  lint: "npm run lint"
  typecheck: "npm run typecheck"
  build: "npm run build"
  unit_test: "npm test"
  ai_review: ""
  e2e_test: "npm run test:e2e"
  visual_test: "npm run test:visual"
  integration_test: "npm run test:e2e:integrated"

proof:
  recommended:
    - install_log
    - build_log
    - unit_test_log
    - e2e_test_log
    - integration_test_log
    - browser_console_status_when_ui
    - screenshots_when_ui
