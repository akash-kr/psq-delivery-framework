adapter:
  id: nextjs
  name: Next.js
  priority: 100
  applies_to:
    - website
    - web_app
    - storefront
    - marketing_site

detect:
  any:
    - next.config.js
    - next.config.mjs
    - next.config.ts
    - app
    - pages

commands:
  install: "if [ -f package-lock.json ]; then npm ci; else npm install; fi"
  lint: "npm run lint"
  typecheck: "npm run typecheck"
  build: "npm run build"
  unit_test: "npm test"
  ai_review: ""
  e2e_test: "npm run test:e2e"
  visual_test: "npm run test:visual"
  integration_test: "npm run test:e2e:integrated"

proof:
  recommended:
    - install_log
    - lint_log
    - build_log
    - unit_test_log
    - e2e_test_log
    - integration_test_log
    - desktop_screenshot
    - mobile_screenshot
    - console_error_check
