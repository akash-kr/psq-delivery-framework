adapter:
  id: node
  name: Node.js
  priority: 20
  applies_to:
    - api
    - cli
    - package
    - service

detect:
  any:
    - package.json

commands:
  install: "if [ -f package-lock.json ]; then npm ci; else npm install; fi"
  lint: "npm run lint"
  typecheck: "npm run typecheck"
  build: "npm run build"
  unit_test: "npm test"
  ai_review: ""
  e2e_test: "skip"
  visual_test: "skip"
  integration_test: "npm run test:integration"

proof:
  recommended:
    - install_log
    - unit_test_log
    - integration_test_log
