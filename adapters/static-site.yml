adapter:
  id: static-site
  name: Static Site
  priority: 50
  applies_to:
    - html
    - css
    - javascript
    - docs

detect:
  any:
    - index.html
    - public/index.html
    - site/index.html

# "skip" is an explicit decision that a step does not apply to this stack.
# A static site has no install/build; leave real commands (e.g. htmlhint,
# a Playwright screenshot run) in place of "skip" where the project has them.
commands:
  install: "skip"
  lint: "skip"
  typecheck: "skip"
  build: "skip"
  unit_test: "skip"
  ai_review: ""
  e2e_test: ""
  visual_test: ""
  integration_test: "skip"

proof:
  recommended:
    - changed_files
    - manual_browser_check
    - screenshots_when_visual
