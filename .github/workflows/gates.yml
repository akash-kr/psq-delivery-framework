name: Grounded Delivery Gates

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  gates:
    runs-on: ubuntu-latest

    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Verify contract
        run: scripts/verify-contract

      - name: Run gates
        run: scripts/run-gate all

      - name: Collect proof
        if: always()
        run: scripts/collect-proof

      - name: Upload proof
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: grounded-delivery-proof
          path: |
            .grounding/
            framework/contract.yml
            framework/harness.json

