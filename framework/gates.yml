# The four milestone gates from psq-framework-deck.html.
# Adapters map their checks to stack-specific commands.

gates:
  - id: G1
    name: build
    purpose: "Build the UI from the contract and prove its unit-level logic."
    required:
      - contract_is_complete
      - escalation_contract_is_valid
      - install_passes
      - lint_or_equivalent_passes
      - build_or_equivalent_passes
      - unit_tests_pass
      - ai_merge_request_review_passes
    on_fail: "Fix the build or report a blocker."

  - id: G2
    name: validate
    purpose: "Run the browser journey and compare screenshots with the approved design."
    required:
      - playwright_or_equivalent_passes
      - visual_comparison_passes
      - screenshot_evidence_recorded
    on_fail: "Fix the UI or test and re-run G2."

  - id: G3
    name: backend_wired
    purpose: "Re-run the agreed journey against the integrated backend and real data contract."
    required:
      - integration_suite_passes
      - frontend_backend_contract_matches
      - regression_evidence_recorded
    on_fail: "Fix the integration and re-run G3 with the same acceptance suite."

  - id: G4
    name: client_uat
    purpose: "Record client UAT approval and release the milestone for invoicing."
    required:
      - all_prior_gates_green_for_same_revision
      - client_approval_matches_contract
      - proof_bundle_valid
      - milestone_release_recorded
    on_fail: "Hold the milestone and invoice; loop approved tweaks through the affected gates."
