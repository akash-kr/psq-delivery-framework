# PSQ Delivery Contract
# Copy and edit this file for each project or milestone. CI must run
# `scripts/verify-contract --strict` before G1.

contract:
  id: psq-delivery-framework
  version: 1.1.0
  status: active
  owner: delivery-owner
  approvers:
    design: design-owner
    engineering: engineering-owner
    qa: qa-owner

project:
  name: PSQ Delivery Framework
  type: framework
  adapter: python
  repo: psq-delivery-framework

objective:
  summary: "Enforce the four-gate delivery process defined by the PSQ framework deck."
  primary_users:
    - design
    - engineering
    - qa
  success_signals:
    - "G1 proves the build and unit tests."
    - "G2 proves browser behavior and visual conformance where applicable."
    - "G3 re-runs the journey against the integrated backend where applicable."
    - "G4 records client UAT approval before milestone release."

scope:
  in:
    - "Contract validation, four gates, proof collection, CI, adapters, and policy-driven escalations."
  out:
    - "Issue tracking, autonomous agent orchestration, sales workflows, and document annotation."
  assumptions:
    - "Repository branch protection supplies the Design and QA approval enforcement that local scripts cannot prove."
  unknowns:
    - "Client-specific Slack, email, invoice, and GitLab approval integrations are configured by each deployment."

quality:
  required:
    - installable
    - buildable
    - testable
    - visually_verified_when_ui
    - integration_verified_when_backend
    - uat_approved
    - proof_collected
  optional:
    - accessibility_check
    - performance_check

acceptance:
  - id: AC-001
    statement: "The executable lifecycle uses the deck's G1 Build, G2 Validate, G3 Backend wired, and G4 Client UAT gates."
    proof: "framework/gates.yml and framework/harness.json"
  - id: AC-002
    statement: "A gate cannot pass when a required command is unconfigured or when a prerequisite gate is stale or red."
    proof: "tests/test_gdf.py"
  - id: AC-003
    statement: "G4 cannot release a milestone without a matching client UAT approval record."
    proof: "tests/test_gdf.py and framework/uat-approval.example.json"
  - id: AC-004
    statement: "The proof bundle identifies the contract, source revision, gate results, command logs, and milestone readiness."
    proof: "framework/proof-schema.json and .grounding proof output"
  - id: AC-005
    statement: "Delivery adapters require an explicit Codex merge-request review integration."
    proof: "adapters/*.yml leave ai_review unconfigured so G1 cannot pass silently"
  - id: AC-006
    statement: "Missed gate deadlines, stuck gates, unapproved contract changes, delayed UAT, milestone risk, and missing proof can be routed to Slack without duplicate alert spam."
    proof: "watcher.rules.yml, tools/escalation-watcher.py, and tests/test_gdf.py"

proof:
  required_files:
    - .grounding/proof-report.md
  required_commands:
    - scripts/verify-contract
    - scripts/run-gate all

change_control:
  contract_changes_require_review: true
  required_approvals:
    - design
    - qa
  approval_note: "Enforce with protected branches and CODEOWNERS in the target forge."
  escalation_changes_require_review: true
  escalation_note: "Treat watcher.rules.yml as a delivery contract: validate it in G1 and require Delivery/QA ownership in the target forge."
