lanes:
  research:
    label: lane:research
    output_dir: docs/research
    proof:
      - source_citations
      - assumptions
      - confidence
      - unknowns

  spec:
    label: lane:spec
    output_dir: docs/spec
    proof:
      - acceptance_criteria
      - scope_boundaries
      - open_decisions

  design:
    label: lane:design
    output_dir: docs/decisions
    proof:
      - decision_record
      - alternatives_considered
      - screenshots_or_wireframes_when_relevant

  code:
    label: lane:code
    output_dir: project
    proof:
      - tests
      - build
      - changed_files
      - screenshots_when_ui

  qa:
    label: lane:qa
    output_dir: docs/qa
    proof:
      - install_logs
      - test_logs
      - screenshots
      - risks

  packaging:
    label: lane:packaging
    output_dir: docs/packaging
    proof:
      - install_docs_checked
      - license_support_notes
      - release_notes

  sales:
    label: lane:sales
    output_dir: docs/sales
    proof:
      - positioning_notes
      - target_buyer
      - assumptions

