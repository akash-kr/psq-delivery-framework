# PSQ escalation contract. The watcher refuses to run when this file is invalid.
# Times may be ISO-8601 dates or timestamps; date-only values mean midnight UTC.
schema_version: 1.0.0

state:
  # Persist this path between scheduler runs to retain deduplication history.
  path: .grounding/escalation-state.json

defaults:
  # Re-notify only while an incident remains active for this long.
  repeat_hours: 4
  send_resolved: true

channels:
  delivery:
    type: slack
    webhook_env: SLACK_WEBHOOK_URL
    # stdout keeps cron/CI observability when Slack is unavailable.
    fallback: stdout

rules:
  gate-stuck:
    type: gate_status
    enabled: true
    statuses:
      - fail
      - blocked
    after_hours: 4
    # A severity change bypasses the repeat cooldown and notifies immediately.
    critical_after_hours: 48
    # Optional gate-specific SLAs override after_hours.
    per_gate:
      G1: 2
      G2: 4
      G3: 4
      G4: 24
    severity: high
    channel: delivery
    notify: "delivery owner, #dev-qa"

  # Enable this per milestone and set the agreed deadline for each gate. This
  # catches work that never started, which gate-stuck alone cannot detect.
  gate-deadline:
    type: gate_deadline
    enabled: false
    deadlines:
      G1: ""
      G2: ""
      G3: ""
      G4: ""
    severity: high
    channel: delivery
    notify: "delivery owner, responsible gate owner"

  contract-unapproved:
    type: contract_approval
    enabled: true
    watch: framework/contract.yml
    approval_trailer: Approved-by
    required_approvers:
      - design
      - qa
    severity: high
    channel: delivery
    notify: "design owner, QA owner"

  # Set a real due date and enable this rule for a delivery milestone.
  milestone-at-risk:
    type: milestone_risk
    enabled: false
    due: ""
    warning_hours: 72
    critical_hours: 24
    severity: warning
    channel: delivery
    notify: "delivery owner"

  uat-waiting:
    type: uat_pending
    enabled: true
    after_hours: 24
    critical_after_hours: 48
    severity: warning
    channel: delivery
    notify: "delivery owner, client approver"

  proof-missing:
    type: artifact_missing
    enabled: true
    after_gate: G3
    paths:
      - .grounding/proof-report.json
      - .grounding/proof-report.md
    severity: high
    channel: delivery
    notify: "delivery owner, QA owner"
